services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ar_reconciliation
      POSTGRES_USER: ar_user
      POSTGRES_PASSWORD: ar_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ar_user -d ar_reconciliation"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ar_reconciliation
      DB_USER: ar_user
      DB_PASSWORD: ar_pass
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      FAILURE_INJECTION: "true"
    ports:
      - "8080:8080"
    deploy:
      replicas: 2

volumes:
  pgdata:
